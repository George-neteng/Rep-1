# /etc/nginx/sites-available/football-app
# Обратный прокси nginx для веб-приложения анализа положения мяча.

server {
    listen 80;
    server_name example.com;           # замените на свой домен
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name example.com;           # замените на свой домен

    ssl_certificate     /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 210m;         # под загрузку видео

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
    }

    location /static/ {
        alias /opt/football-app/static/;
        expires 1h;
    }
}
